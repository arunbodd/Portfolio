name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Allow the default GITHUB_TOKEN to push the built site to the gh-pages branch.
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: CI=false npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          git-config-name: arunbodd
          git-config-email: arunbodd@outlook.com
