<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34e3c8"/>
      <stop offset="1" stop-color="#7c83ff"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="22%" r="55%">
      <stop offset="0" stop-color="#34e3c8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#34e3c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="88%" cy="78%" r="60%">
      <stop offset="0" stop-color="#7c83ff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#7c83ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="brain" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#34e3c8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7c83ff" stop-opacity="0.4"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#05060b"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- Right-side neural cluster (echoes the site's brain) -->
  <g transform="translate(910,315)" opacity="0.9">
    <g stroke="url(#brain)" stroke-width="1.1" opacity="0.5">
      <line x1="-120" y1="-90" x2="40" y2="-140"/>
      <line x1="40" y1="-140" x2="150" y2="-40"/>
      <line x1="150" y1="-40" x2="90" y2="110"/>
      <line x1="90" y1="110" x2="-70" y2="130"/>
      <line x1="-70" y1="130" x2="-150" y2="20"/>
      <line x1="-150" y1="20" x2="-120" y2="-90"/>
      <line x1="-120" y1="-90" x2="90" y2="110"/>
      <line x1="40" y1="-140" x2="-70" y2="130"/>
      <line x1="150" y1="-40" x2="-150" y2="20"/>
      <line x1="-30" y1="-20" x2="60" y2="40"/>
      <line x1="-30" y1="-20" x2="-90" y2="60"/>
      <line x1="60" y1="40" x2="20" y2="-80"/>
    </g>
    <g fill="url(#brain)">
      <circle cx="-120" cy="-90" r="6"/><circle cx="40" cy="-140" r="7"/>
      <circle cx="150" cy="-40" r="6"/><circle cx="90" cy="110" r="7"/>
      <circle cx="-70" cy="130" r="6"/><circle cx="-150" cy="20" r="6"/>
      <circle cx="-30" cy="-20" r="8"/><circle cx="60" cy="40" r="6"/>
      <circle cx="-90" cy="60" r="5"/><circle cx="20" cy="-80" r="5"/>
    </g>
  </g>

  <!-- Lambda mark -->
  <rect x="80" y="86" width="84" height="84" rx="22" fill="url(#brand)"/>
  <text x="122" y="146" text-anchor="middle" fill="#05060b"
        font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700">&#955;</text>
  <text x="184" y="142" fill="#e7ecf6"
        font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700">Arun<tspan fill="#97a1b8" font-weight="400">.bio</tspan></text>

  <!-- Name + title -->
  <text x="80" y="330" fill="#ffffff"
        font-family="Helvetica, Arial, sans-serif" font-size="92" font-weight="700" letter-spacing="-2">Arun Boddapati</text>
  <text x="82" y="402" fill="url(#brand)"
        font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700">AI / ML Data Science Lead</text>
  <text x="82" y="452" fill="#97a1b8"
        font-family="Helvetica, Arial, sans-serif" font-size="27" font-weight="400">Translational Bioinformatics · LLM &amp; Agentic Systems</text>

  <!-- Footer stat row -->
  <text x="82" y="560" fill="#5c6479"
        font-family="'Courier New', monospace" font-size="24" font-weight="400">arunbodd.bio</text>
  <text x="1118" y="560" text-anchor="end" fill="#5c6479"
        font-family="'Courier New', monospace" font-size="24" font-weight="400">9+ yrs · 800+ citations · h-index 11</text>
</svg>
